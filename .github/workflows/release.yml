name: Release RetroMi Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.5)'
        required: true
      arch:
        description: 'Target architecture'
        required: true
        default: 'armhf'
        type: choice
        options:
          - armhf
          - arm64
      distro:
        description: 'Debian version'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - trixie

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Collect artifacts from latest successful builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          MISSING=()

          GROUPS="retroarch arcade arcade-compat nintendo n64 sega sony psp misc openbor scummvm dosbox portables computers amiga japan-computers heavy emulationstation"

          for group in ${GROUPS}; do
            WORKFLOW="build-${group}.yml"
            ARTIFACT="packages-${group}-${{ inputs.arch }}"

            echo "=== ${group} — searching latest successful run ==="

            # Find latest successful run for this workflow
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "${WORKFLOW}" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')

            if [ -z "${RUN_ID}" ]; then
              echo "WARNING: no successful run found for ${WORKFLOW}"
              MISSING+=("${group}")
              continue
            fi

            echo "  Run ID: ${RUN_ID} — downloading ${ARTIFACT}"
            gh run download "${RUN_ID}" \
              --repo "${{ github.repository }}" \
              --name "${ARTIFACT}" \
              --dir "artifacts/${ARTIFACT}" || {
                echo "WARNING: failed to download ${ARTIFACT} from run ${RUN_ID}"
                MISSING+=("${group}")
                continue
              }
          done

          echo ""
          echo "=== Collection summary ==="
          find artifacts/ -name "*.tar.gz" -ls
          echo ""

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Missing groups: ${MISSING[*]}"
            echo "Run the build workflows for these groups first."
            exit 1
          fi

          echo "All 18 groups collected."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}-${{ inputs.arch }}-${{ inputs.distro }}
          name: RetroMi Packages v${{ inputs.version }} (${{ inputs.arch }} / ${{ inputs.distro }})
          body: |
            Pre-compiled RetroArch and libretro cores for **SmartPi** — `${{ inputs.arch }}` / Debian ${{ inputs.distro == 'bookworm' && '12 (Bookworm)' || '13 (Trixie)' }}.

            ${{ inputs.arch == 'armhf' && '> Target: **SmartPi One** (AllWinner H3 — Cortex-A7 — ARMv7 32-bit)' || '> Target: **SmartPi 4** (AllWinner H618 — Cortex-A53 — ARMv8 64-bit)' }}

            ## Package groups

            | Package | Contents |
            |---------|----------|
            | `packages-retroarch-${{ inputs.arch }}.tar.gz` | RetroArch frontend + assets |
            | `packages-arcade-${{ inputs.arch }}.tar.gz` | FinalBurn Neo (lr-fbneo) |
            | `packages-arcade-compat-${{ inputs.arch }}.tar.gz` | MAME 2003+, MAME 2000, FBA 2012 |
            | `packages-nintendo-${{ inputs.arch }}.tar.gz` | NES, SNES, GB/GBC, GBA |
            | `packages-n64-${{ inputs.arch }}.tar.gz` | N64, PC Engine |
            | `packages-sega-${{ inputs.arch }}.tar.gz` | Genesis/MD/CD, Sega CD/32X |
            | `packages-sony-${{ inputs.arch }}.tar.gz` | PS1 |
            | `packages-psp-${{ inputs.arch }}.tar.gz` | PSP |
            | `packages-misc-${{ inputs.arch }}.tar.gz` | Doom, Quake, Cave Story, Pico-8, WASM-4, EasyRPG |
            | `packages-openbor-${{ inputs.arch }}.tar.gz` | OpenBOR (Beat 'em Up engine) |
            | `packages-scummvm-${{ inputs.arch }}.tar.gz` | ScummVM |
            | `packages-dosbox-${{ inputs.arch }}.tar.gz` | DOSBox Pure |
            | `packages-portables-${{ inputs.arch }}.tar.gz` | NGP, Lynx, VB, Pokemon Mini, Arduboy... |
            | `packages-computers-${{ inputs.arch }}.tar.gz` | C64, MSX, Atari, CPC, ZX Spectrum, Apple II, BBC Micro |
            | `packages-amiga-${{ inputs.arch }}.tar.gz` | Amiga (uae4arm/puae) |
            | `packages-japan-computers-${{ inputs.arch }}.tar.gz` | PC-98, PC-88, X68000, Sharp X1 |
            | `packages-heavy-${{ inputs.arch }}.tar.gz` | DS, Dreamcast, Saturn, 3DO, Jaguar |
            | `packages-emulationstation-${{ inputs.arch }}.tar.gz` | EmulationStation frontend |

            Built from [Yumi-Lab/RetroPie-Setup](https://github.com/Yumi-Lab/RetroPie-Setup) on Debian ${{ inputs.distro == 'bookworm' && '12 (Bookworm)' || '13 (Trixie)' }}.
          files: artifacts/**/*.tar.gz
          draft: false
          fail_on_unmatched_files: true
