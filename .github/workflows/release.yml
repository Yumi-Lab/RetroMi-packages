name: Release RetroMi Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.5)'
        required: true
      arch:
        description: 'Target architecture'
        required: true
        default: 'armhf'
        type: choice
        options:
          - armhf
          - arm64
      distro:
        description: 'Debian version'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - trixie

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (for group files)
        uses: actions/checkout@v4

      - name: Collect artifacts from latest successful builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          MISSING=()
          RELEASE_NOTES="release-notes.md"

          PKG_GROUPS="retroarch arcade arcade-compat nintendo n64 sega sony psp misc openbor scummvm dosbox portables computers amiga japan-computers heavy emulationstation"
          GROUP_COUNT=18

          # Human-readable console names per group
          declare -A GROUP_LABELS
          GROUP_LABELS[retroarch]="RetroArch frontend + assets"
          GROUP_LABELS[arcade]="Arcade / Neo Geo / CPS1-2-3 (FinalBurn Neo)"
          GROUP_LABELS[arcade-compat]="Arcade compat (MAME 2003+, MAME 2000, MAME 2010, FBA 2012)"
          GROUP_LABELS[nintendo]="NES, SNES, Game Boy, Game Boy Color, Game Boy Advance"
          GROUP_LABELS[n64]="Nintendo 64, PC Engine / TurboGrafx-16"
          GROUP_LABELS[sega]="Mega Drive / Genesis, Master System, Game Gear, Sega CD, 32X, Neo Geo CD"
          GROUP_LABELS[sony]="PlayStation 1"
          GROUP_LABELS[psp]="PlayStation Portable (PSP)"
          GROUP_LABELS[misc]="Doom, Quake, Cave Story, Atari 2600, DOS, Pico-8, WASM-4, TIC-80, EasyRPG, Java ME"
          GROUP_LABELS[openbor]="OpenBOR (Beat 'em Up engine)"
          GROUP_LABELS[scummvm]="ScummVM (Point & Click adventures)"
          GROUP_LABELS[dosbox]="DOS (DOSBox Pure)"
          GROUP_LABELS[portables]="Neo Geo Pocket, Atari Lynx, Virtual Boy, WonderSwan, PC Engine SuperGrafx, PC-FX, Pokemon Mini, Game & Watch, Atari 7800, Odyssey 2, Vectrex, Fairchild Channel F, Intellivision, Mega Duck, Watara Supervision, Uzebox, Arduboy"
          GROUP_LABELS[computers]="Commodore 64, MSX, Atari 800, Amstrad CPC, ZX Spectrum, ZX81, Thomson MO/TO, Atari ST, Apple II, BBC Micro, Enterprise 128"
          GROUP_LABELS[amiga]="Amiga 500/1200 (uae4arm, PUAE)"
          GROUP_LABELS[japan-computers]="PC-98, PC-88, Sharp X68000, Sharp X1"
          GROUP_LABELS[heavy]="Nintendo DS, Sega Dreamcast, Sega Saturn, 3DO, Atari Jaguar"
          GROUP_LABELS[emulationstation]="EmulationStation frontend"

          echo "## Package groups" > "${RELEASE_NOTES}"
          echo "" >> "${RELEASE_NOTES}"
          echo "| Package | Contents | Cores | Built on |" >> "${RELEASE_NOTES}"
          echo "|---------|----------|-------|----------|" >> "${RELEASE_NOTES}"

          TOTAL_PACKAGES=0

          for group in ${PKG_GROUPS}; do
            WORKFLOW="build-${group}.yml"
            ARTIFACT="packages-${group}-${{ inputs.arch }}"

            echo "=== ${group} — searching latest successful run ==="

            RUN_INFO=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "${WORKFLOW}" \
              --status success \
              --limit 1 \
              --json databaseId,updatedAt \
              --jq '.[0] // empty') || true

            RUN_ID=$(echo "${RUN_INFO}" | jq -r '.databaseId // empty')
            RUN_DATE=$(echo "${RUN_INFO}" | jq -r '.updatedAt // empty' | cut -d'T' -f1)

            if [ -z "${RUN_ID}" ]; then
              echo "WARNING: no successful run found for ${WORKFLOW}"
              MISSING+=("${group}")
              continue
            fi

            PKG_COUNT=0
            if [ -f "groups/${group}.txt" ]; then
              PKG_COUNT=$(grep -v '^#' "groups/${group}.txt" | grep -v '^$' | wc -l | tr -d ' ')
              TOTAL_PACKAGES=$((TOTAL_PACKAGES + PKG_COUNT))
            fi

            LABEL="${GROUP_LABELS[${group}]}"
            echo "  Run ID: ${RUN_ID} — ${RUN_DATE} — ${LABEL} (${PKG_COUNT})"

            echo "| \`packages-${group}-${{ inputs.arch }}.tar.gz\` | ${LABEL} | ${PKG_COUNT} | ${RUN_DATE} |" >> "${RELEASE_NOTES}"

            gh run download "${RUN_ID}" \
              --repo "${{ github.repository }}" \
              --name "${ARTIFACT}" \
              --dir "artifacts/${ARTIFACT}" || {
                echo "WARNING: failed to download ${ARTIFACT} from run ${RUN_ID}"
                MISSING+=("${group}")
                continue
              }
          done

          echo "" >> "${RELEASE_NOTES}"
          echo "**Total: ${TOTAL_PACKAGES} emulator cores + engines** across ${GROUP_COUNT} groups." >> "${RELEASE_NOTES}"

          echo ""
          echo "=== Collection summary ==="
          find artifacts/ -name "*.tar.gz" -ls
          echo ""
          echo "=== Release notes ==="
          cat "${RELEASE_NOTES}"
          echo ""

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Missing groups: ${MISSING[*]}"
            echo "Run the build workflows for these groups first."
            exit 1
          fi

          echo "All 18 groups collected."

      - name: Build full release body
        id: body
        run: |
          ARCH="${{ inputs.arch }}"
          DISTRO="${{ inputs.distro }}"

          if [ "${ARCH}" = "armhf" ]; then
            TARGET="> Target: **SmartPi One** (AllWinner H3 — Cortex-A7 — ARMv7 32-bit)"
          else
            TARGET="> Target: **SmartPi 4** (AllWinner H618 — Cortex-A53 — ARMv8 64-bit)"
          fi

          if [ "${DISTRO}" = "bookworm" ]; then
            DISTRO_LABEL="12 (Bookworm)"
          else
            DISTRO_LABEL="13 (Trixie)"
          fi

          NOTES=$(cat release-notes.md)

          {
            echo "Pre-compiled RetroArch and libretro cores for **SmartPi** — \`${ARCH}\` / Debian ${DISTRO_LABEL}."
            echo ""
            echo "${TARGET}"
            echo ""
            echo "${NOTES}"
            echo ""
            echo "Built from [Yumi-Lab/RetroPie-Setup](https://github.com/Yumi-Lab/RetroPie-Setup) on Debian ${DISTRO_LABEL}."
          } > body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}-${{ inputs.arch }}-${{ inputs.distro }}
          name: RetroMi Packages v${{ inputs.version }} (${{ inputs.arch }} / ${{ inputs.distro }})
          body_path: body.md
          files: artifacts/**/*.tar.gz
          draft: false
          fail_on_unmatched_files: true
