name: Release RetroMi Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.5)'
        required: true
      arch:
        description: 'Target architecture'
        required: true
        default: 'armhf'
        type: choice
        options:
          - armhf
          - arm64
      distro:
        description: 'Debian version'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - trixie

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (for group files)
        uses: actions/checkout@v4

      - name: Collect artifacts from latest successful builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          MISSING=()
          RELEASE_NOTES="release-notes.md"

          GROUPS="retroarch arcade arcade-compat nintendo n64 sega sony psp misc openbor scummvm dosbox portables computers amiga japan-computers heavy emulationstation"

          # Header
          cat > "${RELEASE_NOTES}" << 'HEADER'
          ## Package groups

          | Group | Packages | Built on |
          |-------|----------|----------|
          HEADER
          # Remove leading spaces from heredoc
          sed -i 's/^          //' "${RELEASE_NOTES}"

          TOTAL_PACKAGES=0

          for group in ${GROUPS}; do
            WORKFLOW="build-${group}.yml"
            ARTIFACT="packages-${group}-${{ inputs.arch }}"

            echo "=== ${group} — searching latest successful run ==="

            # Find latest successful run with date
            RUN_INFO=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "${WORKFLOW}" \
              --status success \
              --limit 1 \
              --json databaseId,updatedAt \
              --jq '.[0] // empty')

            RUN_ID=$(echo "${RUN_INFO}" | jq -r '.databaseId // empty')
            RUN_DATE=$(echo "${RUN_INFO}" | jq -r '.updatedAt // empty' | cut -d'T' -f1)

            if [ -z "${RUN_ID}" ]; then
              echo "WARNING: no successful run found for ${WORKFLOW}"
              MISSING+=("${group}")
              continue
            fi

            # Read packages from group file
            PACKAGES=""
            if [ -f "groups/${group}.txt" ]; then
              PACKAGES=$(grep -v '^#' "groups/${group}.txt" | grep -v '^$' | tr '\n' ', ' | sed 's/,$//' | sed 's/,/, /g')
              PKG_COUNT=$(grep -v '^#' "groups/${group}.txt" | grep -v '^$' | wc -l | tr -d ' ')
              TOTAL_PACKAGES=$((TOTAL_PACKAGES + PKG_COUNT))
            fi

            echo "  Run ID: ${RUN_ID} — ${RUN_DATE} — ${PACKAGES}"

            # Add to release notes
            echo "| \`${group}\` | ${PACKAGES} | ${RUN_DATE} |" >> "${RELEASE_NOTES}"

            gh run download "${RUN_ID}" \
              --repo "${{ github.repository }}" \
              --name "${ARTIFACT}" \
              --dir "artifacts/${ARTIFACT}" || {
                echo "WARNING: failed to download ${ARTIFACT} from run ${RUN_ID}"
                MISSING+=("${group}")
                continue
              }
          done

          # Footer
          cat >> "${RELEASE_NOTES}" << EOF

          **Total: ${TOTAL_PACKAGES} packages** across ${#GROUPS[@]} groups.
          EOF
          sed -i 's/^          //' "${RELEASE_NOTES}"

          echo ""
          echo "=== Collection summary ==="
          find artifacts/ -name "*.tar.gz" -ls
          echo ""
          echo "=== Release notes ==="
          cat "${RELEASE_NOTES}"
          echo ""

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "ERROR: Missing groups: ${MISSING[*]}"
            echo "Run the build workflows for these groups first."
            exit 1
          fi

          echo "All 18 groups collected."

      - name: Build full release body
        id: body
        run: |
          ARCH="${{ inputs.arch }}"
          DISTRO="${{ inputs.distro }}"

          if [ "${ARCH}" = "armhf" ]; then
            TARGET="> Target: **SmartPi One** (AllWinner H3 — Cortex-A7 — ARMv7 32-bit)"
          else
            TARGET="> Target: **SmartPi 4** (AllWinner H618 — Cortex-A53 — ARMv8 64-bit)"
          fi

          if [ "${DISTRO}" = "bookworm" ]; then
            DISTRO_LABEL="12 (Bookworm)"
          else
            DISTRO_LABEL="13 (Trixie)"
          fi

          NOTES=$(cat release-notes.md)

          cat > body.md << EOF
          Pre-compiled RetroArch and libretro cores for **SmartPi** — \`${ARCH}\` / Debian ${DISTRO_LABEL}.

          ${TARGET}

          ${NOTES}

          Built from [Yumi-Lab/RetroPie-Setup](https://github.com/Yumi-Lab/RetroPie-Setup) on Debian ${DISTRO_LABEL}.
          EOF
          sed -i 's/^          //' body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}-${{ inputs.arch }}-${{ inputs.distro }}
          name: RetroMi Packages v${{ inputs.version }} (${{ inputs.arch }} / ${{ inputs.distro }})
          body_path: body.md
          files: artifacts/**/*.tar.gz
          draft: false
          fail_on_unmatched_files: true
