name: "Build: scummvm"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version'
        required: true
        default: '1.0.5'
      arch:
        description: 'Target architecture'
        required: true
        default: 'armhf'
        type: choice
        options: [armhf, arm64]
      distro:
        description: 'Debian version'
        required: true
        default: 'bookworm'
        type: choice
        options: [bookworm, trixie]

concurrency:
  group: build-scummvm-${{ inputs.arch }}-${{ inputs.distro }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/_build-group.yml
    with:
      group: scummvm
      version: ${{ inputs.version }}
      arch: ${{ inputs.arch }}
      distro: ${{ inputs.distro }}
      # ScummVM armhf ~33h — must run on self-hosted (GitHub timeout = 6h)
      runner: ${{ inputs.arch == 'armhf' && 'yumi-lab' || 'ubuntu-latest' }}
      timeout: ${{ inputs.arch == 'armhf' && 14400 || 360 }}
