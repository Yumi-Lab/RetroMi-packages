name: Build RetroMi Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

concurrency:
  group: build-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.group == 'scummvm' && 'self-hosted' || 'ubuntu-latest' }}
    timeout-minutes: ${{ matrix.group == 'scummvm' && 1000 || matrix.group == 'arcade-compat' && 150 || 120 }}
    strategy:
      fail-fast: false
      matrix:
        group:
          # Core
          - retroarch
          # Arcade (split: fbneo seul + compat MAME)
          - arcade
          - arcade-compat
          # Nintendo (split: classiques + N64)
          - nintendo
          - n64
          # Sega
          - sega
          # Sony (split: PS1 + PSP)
          - sony
          - psp
          # Divers (split: ports légers + ScummVM seul + DosBox seul + portables)
          - misc
          - scummvm
          - dosbox
          - portables
          # Ordinateurs (split: home computers + Amiga + Japon)
          - computers
          - amiga
          - japan-computers
          # Lourds (DS, Dreamcast, Saturn, 3DO, Jaguar)
          - heavy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (armhf)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm/v7

      - name: Create output directory
        run: mkdir -p "${{ github.workspace }}/output"

      - name: Build ${{ matrix.group }} packages (armhf)
        run: |
          docker run --platform linux/arm/v7 --rm \
            -v "${{ github.workspace }}/scripts:/scripts:ro" \
            -v "${{ github.workspace }}/groups:/groups:ro" \
            -v "${{ github.workspace }}/output:/output" \
            debian:bookworm \
            /bin/bash /scripts/build-group.sh "${{ matrix.group }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.group }}-armhf
          path: output/packages-${{ matrix.group }}-armhf.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -name "*.tar.gz" -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: RetroMi Packages v${{ github.event.inputs.version }}
          body: |
            Pre-compiled RetroArch and libretro cores for **SmartPi One** (AllWinner H3 — ARMv7 armhf / Debian Bookworm).

            ## Package groups

            | Package | Contents |
            |---------|----------|
            | `packages-retroarch-armhf.tar.gz` | RetroArch frontend + assets |
            | `packages-arcade-armhf.tar.gz` | FinalBurn Neo (lr-fbneo) |
            | `packages-arcade-compat-armhf.tar.gz` | MAME 2003+, MAME 2000, FBA 2012 |
            | `packages-nintendo-armhf.tar.gz` | NES (fceumm, nestopia, mesen, quicknes), SNES (snes9x2010), GB/GBC (gambatte, tgbdual), GBA (mgba, gpsp, vba-next) |
            | `packages-n64-armhf.tar.gz` | N64 (mupen64plus, mupen64plus-next), PC Engine (beetle-pce-fast) |
            | `packages-sega-armhf.tar.gz` | Genesis/MD/CD (genesis-plus-gx), Sega CD/32X (picodrive) |
            | `packages-sony-armhf.tar.gz` | PS1 (pcsx-rearmed, beetle-psx) |
            | `packages-psp-armhf.tar.gz` | PSP (ppsspp) |
            | `packages-misc-armhf.tar.gz` | Doom, Quake, Cave Story, Atari 2600, Pico-8 (fake08), WASM-4, EasyRPG, ONScripter, FreeJ2ME |
            | `packages-portables-armhf.tar.gz` | Neo Geo Pocket, Atari Lynx, Virtual Boy, Pokemon Mini, Game & Watch, Atari 7800, Odyssey², Vectrex, Fairchild, Mega Duck, Watara Supervision, Uzebox, Arduboy |
            | `packages-computers-armhf.tar.gz` | C64 (vice), MSX (bluemsx), Atari 8-bit (atari800), Amstrad CPC (caprice32), ZX Spectrum (fuse), ZX81, Thomson (theodore), Apple II (applewin), BBC Micro (b2) |
            | `packages-amiga-armhf.tar.gz` | Amiga (uae4arm) |
            | `packages-heavy-armhf.tar.gz` | Nintendo DS (desmume2015), Dreamcast (flycast), Saturn (yabause, kronos, beetle-saturn) |

            > ⚠️ Packages in `heavy` and `psp` may run too slowly on SmartPi One (H3 armhf). Included for completeness.

            Built from [Yumi-Lab/RetroPie-Setup](https://github.com/Yumi-Lab/RetroPie-Setup) on Debian Bookworm (armhf).
          files: artifacts/**/*.tar.gz
          draft: false
          fail_on_unmatched_files: true
