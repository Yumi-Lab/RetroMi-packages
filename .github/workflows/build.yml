name: Build RetroMi Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

concurrency:
  group: build-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - retroarch
          - arcade
          - nintendo
          - sega
          - sony
          - misc
          - computers
          - heavy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (armhf)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm/v7

      - name: Create output directory
        run: mkdir -p "${{ github.workspace }}/output"

      - name: Build ${{ matrix.group }} packages (armhf)
        run: |
          docker run --platform linux/arm/v7 --rm \
            -v "${{ github.workspace }}/scripts:/scripts:ro" \
            -v "${{ github.workspace }}/groups:/groups:ro" \
            -v "${{ github.workspace }}/output:/output" \
            debian:bookworm \
            /bin/bash /scripts/build-group.sh "${{ matrix.group }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.group }}-armhf
          path: output/packages-${{ matrix.group }}-armhf.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -name "*.tar.gz" -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: RetroMi Packages v${{ github.event.inputs.version }}
          body: |
            Pre-compiled RetroArch and libretro cores for **SmartPi One** (AllWinner H3 — ARMv7 armhf / Debian Bookworm).

            ## Package groups

            | Package | Contents |
            |---------|----------|
            | `packages-retroarch-armhf.tar.gz` | RetroArch frontend + assets |
            | `packages-arcade-armhf.tar.gz` | lr-fbneo, lr-mame2003-plus, lr-mame2000, lr-fbalpha2012 |
            | `packages-nintendo-armhf.tar.gz` | NES (fceumm, nestopia, mesen, quicknes), SNES (snes9x2010), GB/GBC (gambatte, tgbdual), GBA (mgba, gpsp, vba-next), N64 (mupen64plus, mupen64plus-next), PC Engine (beetle-pce-fast) |
            | `packages-sega-armhf.tar.gz` | Genesis/MD/CD/GG (genesis-plus-gx), Sega CD/32X (picodrive) |
            | `packages-sony-armhf.tar.gz` | PS1 (pcsx-rearmed, beetle-psx), PSP (ppsspp) |
            | `packages-misc-armhf.tar.gz` | Doom, Quake, Cave Story, ScummVM, DOS, Atari 2600, Neo Geo Pocket, Atari Lynx, Virtual Boy, Pokemon Mini, Game & Watch, Atari 7800, Odyssey2, Vectrex, Fairchild, SMS/GG |
            | `packages-computers-armhf.tar.gz` | Amiga (uae4arm), C64 (vice), MSX (bluemsx), Atari 8-bit (atari800), Amstrad CPC (caprice32), ZX Spectrum (fuse), ZX81 (lr-81), Thomson (theodore) |
            | `packages-heavy-armhf.tar.gz` | Nintendo DS (desmume2015), Dreamcast (flycast), Saturn (yabause, kronos, beetle-saturn) |

            > ⚠️ Packages in `heavy` may run too slowly on SmartPi One (H3 armhf). They are included for completeness.

            Built from [YUMI-RETROPIE](https://github.com/Yumi-Lab/YUMI-RETROPIE) on Debian Bookworm (armhf).

            ## Usage

            These packages are automatically downloaded by the RetroMi image builder.
            You do not need to install them manually.
          files: artifacts/**/*.tar.gz
          draft: false
          fail_on_unmatched_files: true
