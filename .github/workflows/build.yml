name: Build RetroMi Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      arch:
        description: 'Target architecture'
        required: true
        default: 'armhf'
        type: choice
        options:
          - armhf
          - arm64

concurrency:
  group: build-packages-${{ github.ref }}-${{ inputs.arch }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.group == 'scummvm' && inputs.arch == 'armhf' && 'yumi-lab' || 'ubuntu-latest' }}
    timeout-minutes: ${{ matrix.group == 'scummvm' && inputs.arch == 'armhf' && 14400 || 360 }}
    strategy:
      fail-fast: false
      matrix:
        group:
          # Core
          - retroarch
          # Arcade (split: fbneo seul + compat MAME)
          - arcade
          - arcade-compat
          # Nintendo (split: classiques + N64)
          - nintendo
          - n64
          # Sega
          - sega
          # Sony (split: PS1 + PSP)
          - sony
          - psp
          # Divers (split: ports légers + ScummVM seul + DosBox seul + portables)
          - misc
          - scummvm
          - dosbox
          - portables
          # Ordinateurs (split: home computers + Amiga + Japon)
          - computers
          - amiga
          - japan-computers
          # Lourds (DS, Dreamcast, Saturn, 3DO, Jaguar)
          - heavy
          # Frontend
          - emulationstation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup orphaned Docker containers
        if: matrix.group == 'scummvm' && inputs.arch == 'armhf'
        run: |
          docker ps -q | xargs -r docker kill || true
          docker container prune -f || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ inputs.arch == 'armhf' && 'linux/arm/v7' || 'linux/arm64' }}

      - name: Create output directory
        run: mkdir -p "${{ github.workspace }}/output"

      - name: Build ${{ matrix.group }} packages (${{ inputs.arch }})
        env:
          ARCH: ${{ inputs.arch }}
        run: |
          PLATFORM="${{ inputs.arch == 'armhf' && 'linux/arm/v7' || 'linux/arm64' }}"
          docker run --platform "${PLATFORM}" --rm \
            -e ARCH="${{ inputs.arch }}" \
            -v "${{ github.workspace }}/scripts:/scripts:ro" \
            -v "${{ github.workspace }}/groups:/groups:ro" \
            -v "${{ github.workspace }}/output:/output" \
            debian:bookworm \
            /bin/bash /scripts/build-group.sh "${{ matrix.group }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.group }}-${{ inputs.arch }}
          path: output/packages-${{ matrix.group }}-${{ inputs.arch }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -name "*.tar.gz" -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ inputs.arch }}
          name: RetroMi Packages v${{ github.event.inputs.version }} (${{ inputs.arch }})
          body: |
            Pre-compiled RetroArch and libretro cores for **SmartPi** — `${{ inputs.arch }}` / Debian Bookworm.

            ${{ inputs.arch == 'armhf' && '> Target: **SmartPi One** (AllWinner H3 — Cortex-A7 — ARMv7 32-bit)' || '> Target: **SmartPi 4** (AllWinner H618 — Cortex-A53 — ARMv8 64-bit)' }}

            ## Package groups

            | Package | Contents |
            |---------|----------|
            | `packages-retroarch-${{ inputs.arch }}.tar.gz` | RetroArch frontend + assets |
            | `packages-arcade-${{ inputs.arch }}.tar.gz` | FinalBurn Neo (lr-fbneo) |
            | `packages-arcade-compat-${{ inputs.arch }}.tar.gz` | MAME 2003+, MAME 2000, FBA 2012 |
            | `packages-nintendo-${{ inputs.arch }}.tar.gz` | NES, SNES, GB/GBC, GBA |
            | `packages-n64-${{ inputs.arch }}.tar.gz` | N64, PC Engine |
            | `packages-sega-${{ inputs.arch }}.tar.gz` | Genesis/MD/CD, Sega CD/32X |
            | `packages-sony-${{ inputs.arch }}.tar.gz` | PS1 |
            | `packages-psp-${{ inputs.arch }}.tar.gz` | PSP |
            | `packages-misc-${{ inputs.arch }}.tar.gz` | Doom, Quake, Cave Story, Pico-8, WASM-4, EasyRPG |
            | `packages-portables-${{ inputs.arch }}.tar.gz` | NGP, Lynx, VB, Pokemon Mini, Arduboy... |
            | `packages-computers-${{ inputs.arch }}.tar.gz` | C64, MSX, Atari, CPC, ZX Spectrum, Apple II, BBC Micro |
            | `packages-amiga-${{ inputs.arch }}.tar.gz` | Amiga (uae4arm/puae) |
            | `packages-japan-computers-${{ inputs.arch }}.tar.gz` | PC-98, PC-88, X68000, Sharp X1 |
            | `packages-heavy-${{ inputs.arch }}.tar.gz` | DS, Dreamcast, Saturn, 3DO, Jaguar |
            | `packages-emulationstation-${{ inputs.arch }}.tar.gz` | EmulationStation frontend |

            Built from [Yumi-Lab/RetroPie-Setup](https://github.com/Yumi-Lab/RetroPie-Setup) on Debian Bookworm.
          files: artifacts/**/*.tar.gz
          draft: false
          fail_on_unmatched_files: true